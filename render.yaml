databases:
  - name: task360-db
    plan: free
    databaseName: task360
    user: task360user

services:
  - type: web
    name: task360-engine
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma db push --skip-generate && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: task360-db
          property: connectionString
      - key: SUPER_ADMIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
